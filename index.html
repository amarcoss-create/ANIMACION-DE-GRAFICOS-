<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio de Proyectos</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(135deg,#111,#1f2937);
            color: white;
            padding: 20px;
        }

        .contenedor{
            width: 100%;
            max-width: 900px;

            text-align: center;

            background: rgba(255,255,255,0.05);
            padding: 40px;
            border-radius: 20px;
        }

        h1{
            font-size: 45px;
            margin-bottom: 10px;
        }

        p{
            color: #cfcfcf;
            margin-bottom: 30px;
        }

        .botones{
            display: grid;
            grid-template-columns: repeat(auto-fit,minmax(150px,1fr));
            gap: 15px;
        }

        a{
            text-decoration: none;
            color: white;

            background-color: #2563eb;

            padding: 15px;
            border-radius: 10px;

            transition: .3s;
        }

        a:hover{
            transform: translateY(-5px);
            background-color: #1d4ed8;
        }

        footer{
            margin-top: 30px;
            color: #bdbdbd;
            font-size: 14px;
        }

    </style>
</head>
<body>

    <div class="contenedor">

        <h1>Mi Portafolio Web</h1>

        <p>
            Repositorio que reúne los proyectos y prácticas
            desarrollados durante el curso.
        </p>

        <div class="botones">
            <a href="./s1/index.html">Proyecto S1</a>
            <a href="./s2/index.html">Proyecto S2</a>
            <a href="./s3/index.html">Proyecto S3</a>
            <a href="./s4/index.html">Proyecto S4</a>
            <a href="./s5/index.html">Proyecto S5</a>
            <a href="./s6/index.html">Proyecto S6</a>
            <a href="./s7/index.html">Proyecto S7</a>
        </div>

        <footer>
            Desarrollado por Marcos José Segundo Inquiltupa
        </footer>

    </div>

</body>
</html>

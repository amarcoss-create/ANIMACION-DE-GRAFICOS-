<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyectos</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            background-color: black;
            color: white;
            padding: 20px;
        }

        .contenedor{
            width: 100%;
            max-width: 900px;

            text-align: center;

            background-color: darkslategray;
            padding: 40px;
            border-radius: 20px;
        }

        h1{
            font-size: 45px;
            margin-bottom: 10px;
            color: white;
        }

        h2{
            margin-top: 40px;
            margin-bottom: 20px;
            color: white;
            font-size: 30px;
        }

        p{
            color: white;
            margin-bottom: 30px;
        }

        .botones{
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        a{
            text-decoration: none;
            color: white;

            background-color: royalblue;

            padding: 15px;
            border-radius: 10px;

            transition: 0.3s;
        }

        a:hover{
            transform: translateY(-5px);
            background-color: blue;
        }

        footer{
            margin-top: 30px;
            color: white;
            font-size: 14px;
        }

    </style>
</head>

<body>

    <div class="contenedor">

        <h1>Trabajos Lugar</h1>

        <p>
            zzzzZZZZ
        </p>

            <a href="./s13/index.html">Animación 1</a>
            <a href="./s14/index.html">Animación 2</a>
            <a href="./s15/index.html">Animacion final</a>
        </div>

        <footer>
            Desarrollado por Mii
        </footer>

    </div>

</body>
</html>

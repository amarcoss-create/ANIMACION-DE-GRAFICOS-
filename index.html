<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto S7</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background-color:black;
            color:white;
        }

        .contenedor{
            width:800px;

            text-align:center;

            background-color:darkslategray;

            padding:40px;

            border-radius:20px;
        }

        h1{
            font-size:45px;
            margin-bottom:20px;
        }

        p{
            font-size:20px;
            margin-bottom:30px;
        }

        .boton{
            text-decoration:none;

            background-color:royalblue;
            color:white;

            padding:15px 30px;

            border-radius:10px;

            transition:0.3s;
        }

        .boton:hover{
            background-color:blue;
        }

    </style>
</head>
<body>

    <div class="contenedor">

        <h1>Proyecto S7</h1>

        <p>
            Trabajo desarrollado durante el curso.
        </p>

        <a href="../index.html" class="boton">
            Volver al menú
        </a>

    </div>

</body>
</html>

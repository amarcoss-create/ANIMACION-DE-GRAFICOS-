<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animación Hiperrealista</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="contenedor">

        <h1>Animación Hiperrealista</h1>

        <p class="descripcion">
            Escanee el código QR con su celular para iniciar la experiencia de
            Realidad Aumentada.
        </p>

        <div class="qr">

            <h2>Código QR</h2>

            <!-- Aquí luego pondremos el QR -->
            <img src="imagenes/qr.png" alt="QR" id="codigoQR">

        </div>

        <button id="btnMarcador">
            Mostrar marcador
        </button>

        <div id="contenedorMarcador">

            <h2>Marcador</h2>

            <!-- Aquí irá la imagen que detectará la cámara -->
            <img src="marcador/marcador.png" alt="Marcador" id="marcador">

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>

<html>
<head>
    <title>Cohete Espacial</title>

    <style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        background-color:black;

        display:flex;
        flex-direction:column;
        justify-content:center;
        align-items:center;

        min-height:100vh;
    }

    h1{
        color:white;
        font-family:Arial;
        margin-bottom:20px;
    }

    #contenedor{
        width:400px;
        height:300px;

        border:5px solid white;

        position:relative;
        overflow:hidden;

        background-color:black;
    }

    .estrellas{
        position:absolute;
        width:4px;
        height:4px;

        background-color:white;
        border-radius:50%;
    }

    .e1{
        box-shadow:
            20px 30px white,
            150px 100px white,
            300px 50px white,
            300px 280px white;

        animation:mover1 3s linear infinite;
    }

    .e2{
        box-shadow:
            80px 60px white,
            200px 150px white,
            350px 90px white,
            120px 200px white,
            120px 270px white;

        animation:mover2 2s linear infinite;
    }

    .e3{
        box-shadow:
            50px 10px white,
            180px 70px white,
            280px 180px white,
            280px 290px white;

        animation:mover3 1s linear infinite;
    }

    @keyframes mover1{
        from{
            left:300px;
        }

        to{
            left:-400px;
        }
    }

    @keyframes mover2{
        from{
            left:300px;
        }

        to{
            left:-400px;
        }
    }

    @keyframes mover3{
        from{
            left:300px;
        }

        to{
            left:-400px;
        }
    }

    #cohete{
        width:80px;
        height:80px;

        position:absolute;

        top:110px;
        left:160px;
    }

    #cohete img{
        width:80px;
        height:80px;
    }

    .boton{
        margin-top:20px;

        background-color:blue;
        color:white;

        padding:10px 20px;

        text-decoration:none;

        border-radius:10px;

        font-family:Arial;
    }

    .boton:hover{
        background-color:navy;
    }

    </style>
</head>

<body>

    <h1>Cohete Espacial</h1>

    <div id="contenedor">

        <div class="estrellas e1"></div>
        <div class="estrellas e2"></div>
        <div class="estrellas e3"></div>

        <div id="cohete">
            <img src="img/nave.gif" alt="">
        </div>

    </div>

    <a href="../index.html" class="boton">
        Volver al menú
    </a>

</body>
</html>

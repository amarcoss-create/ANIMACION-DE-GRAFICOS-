<html>
    <head>
        <title></title>
        <style>
            *{
                margin:0px;
                padding:0px;
                
            }
            .contenedor{
                width: 800px;
                height: 300px;
                border: 1px solid black;
                position: relative;
                margin: 0 auto;
                overflow: hidden;
            }
            .cuadrito{
                width: 100px;
                height: 100px;
                /* background-color: brown; */
                position: absolute;
                top: 0px;
                left: 0px;

                animation: cuadrito 4s infinite;
            }
            .abeja{
                position: absolute;
                width: 100%;
                rotate: 45deg;
                z-index: 2;
            }
            .cuadrito2{
                width: 100px;
                height: 100px;
                /* background-color: rgb(0, 68, 255); */
                position: absolute;
                top: 0px;
                left: 0px;
                z-index: 2;

                animation: cuadrito2 4s infinite;
            }
            @keyframes cuadrito{
                0%{
                    top: 0px;
                    left: 0px;
                    rotate:45deg;
                }
                25%{
                    top: 100px;
                    left: 0px;
                    rotate:0deg;
                }
                50%{
                    top: 0px;
                    left: 350px;
                    rotate:45deg;
                }
                75%{
                    top: 200px;
                    left: 350px;
                    rotate:0deg;
                }
                100%{
                    top: 100px;
                    left: 700px;
                    rotate:45deg;
                }
            }
            @keyframes cuadrito2{
                0%{
                    top: 100px;
                    left: 100px;
                }
                50%{
                    top: 0px;
                    left: 350px;
                }
            }
           .pradera{
                position: absolute;
                top: 0px;
                left: 0px;
                width: 100%;
                z-index: 0;
            }
            .freezer{
                position: absolute;
                top: 110px;
                left: 700px;
                width: 15%;
                z-index: 1;
            }
            .krillin{
                position: absolute;
                width: 100%;
                rotate: 45deg;
                z-index: 2;
            }
        </style>
    </head>
    <body>
        <div class="contenedor">
           <div class="cuadrito2">
            <img class="krillin" src="img/krillin.png" alt="">
           </div>
            <img class="pradera" src="img/namek-dragon-ball.webp" alt="">
            <div class="cuadrito">
                <img class="abeja" src="img/dende.png" alt="">
            </div>
            
            <img class="freezer" src="img/freezer.png" alt="">
        </div>
    </body>
</html>

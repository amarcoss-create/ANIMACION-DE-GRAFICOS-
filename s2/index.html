<html>
<head>
    <title>Animación S2</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background-color:black;

            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;

            min-height:100vh;
        }

        h1{
            color:white;
            font-family:Arial;
            margin-bottom:20px;
        }

        .contenedor{
            width:800px;
            height:300px;

            border:5px solid white;

            position:relative;
            overflow:hidden;
        }

        .cuadrito{
            width:100px;
            height:100px;

            position:absolute;
            top:0;
            left:0;

            animation:cuadrito 4s infinite;
        }

        .abeja{
            position:absolute;
            width:100%;
            rotate:45deg;
            z-index:2;
        }

        .cuadrito2{
            width:100px;
            height:100px;

            position:absolute;
            top:0;
            left:0;

            z-index:2;

            animation:cuadrito2 4s infinite;
        }

        .pradera{
            position:absolute;
            top:0;
            left:0;
            width:100%;
            z-index:0;
        }

        .freezer{
            position:absolute;
            top:110px;
            left:700px;
            width:15%;
            z-index:1;
        }

        .krillin{
            position:absolute;
            width:100%;
            rotate:45deg;
            z-index:2;
        }

        .boton{
            margin-top:20px;

            background-color:blue;
            color:white;

            padding:10px 20px;

            text-decoration:none;

            border-radius:10px;

            font-family:Arial;
        }

        .boton:hover{
            background-color:navy;
        }

        @keyframes cuadrito{
            0%{
                top:0;
                left:0;
                rotate:45deg;
            }

            25%{
                top:100px;
                left:0;
                rotate:0deg;
            }

            50%{
                top:0;
                left:350px;
                rotate:45deg;
            }

            75%{
                top:200px;
                left:350px;
                rotate:0deg;
            }

            100%{
                top:100px;
                left:700px;
                rotate:45deg;
            }
        }

        @keyframes cuadrito2{
            0%{
                top:100px;
                left:100px;
            }

            50%{
                top:0;
                left:350px;
            }
        }

    </style>
</head>

<body>

    <h1>Animación S2</h1>

    <div class="contenedor">

        <div class="cuadrito2">
            <img class="krillin" src="img/krillin.png" alt="">
        </div>

        <img class="pradera" src="img/namek-dragon-ball.webp" alt="">

        <div class="cuadrito">
            <img class="abeja" src="img/dende.png" alt="">
        </div>

        <img class="freezer" src="img/freezer.png" alt="">

    </div>

    <a href="../index.html" class="boton">Volver al menú</a>

</body>
</html>
